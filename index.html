<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Range Master (100BB)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }
        .header {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .header-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #f39c12;
        }
        
        /* Legend Styles (Chú thích màu) */
        .legend {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: flex-start;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            color: #bbb;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .color-box {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }
        .bg-raise { background-color: #e74c3c; }
        .bg-call  { background-color: #2ecc71; }
        .bg-fold  { background-color: #555555; }

        /* Grid Styles */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 2px;
            width: 100%;
            max-width: 500px;
            background-color: #222;
            padding: 3px;
            border-radius: 6px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .cell {
            aspect-ratio: 1 / 1;
            background-color: #444; /* Màu xám mặc định (Fold) */
            color: #999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(8px, 2.5vw, 13px);
            font-weight: 600;
            cursor: pointer;
            border-radius: 2px;
            user-select: none;
            transition: all 0.2s;
        }
        /* Đổi màu theo hành động */
        .cell.raise {
            background-color: #e74c3c; /* Đỏ - Raise */
            color: white;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
        }
        .cell.call {
            background-color: #2ecc71; /* Xanh - Call / Limp */
            color: #111;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
        }

        /* Note Box Styles */
        .note-box {
            width: 100%;
            max-width: 500px;
            background-color: #1e1e1e;
            border-left: 4px solid #f39c12;
            padding: 12px 15px;
            margin-top: 15px;
            border-radius: 4px;
            font-size: 0.9rem;
            line-height: 1.5;
            color: #ddd;
        }
        .note-box b {
            color: #f39c12;
        }

        /* Stats Styles */
        .stats {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #888;
        }

        /* Poker Table Styles */
        .table-area {
            margin-top: 30px;
            position: relative;
            width: 320px;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .poker-table {
            width: 250px;
            height: 110px;
            background-color: #1b5e20;
            border: 8px solid #4e342e;
            border-radius: 125px / 55px;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        
        .pos-btn {
            position: absolute;
            background-color: #333;
            color: #aaa;
            border: 2px solid #555;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }
        .pos-btn:hover {
            border-color: #f39c12;
            color: white;
        }
        .pos-btn.active {
            background-color: #f39c12;
            color: #111;
            border-color: #f39c12;
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.5);
        }
        
        /* Căn chỉnh vị trí */
        #btn-BTN { top: 0px; left: 50%; transform: translateX(-50%); }
        #btn-SB  { top: 15px; right: 0px; }
        #btn-BB  { bottom: 45px; right: -20px; }
        #btn-UTG { bottom: 0px; right: 30px; }
        #btn-MP  { bottom: 0px; left: 30px; }
        #btn-HJ  { bottom: 45px; left: -20px; }
        #btn-CO  { top: 15px; left: 0px; }

    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">♠️ 100BB GTO Ranges</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="color-box bg-raise"></div> Raise / 3-Bet</div>
        <div class="legend-item"><div class="color-box bg-call"></div> Call / Check</div>
        <div class="legend-item"><div class="color-box bg-fold"></div> Fold</div>
    </div>

    <div class="grid-container" id="handGrid"></div>

    <div class="stats">
        <div id="percentage">0%</div>
        <div id="handCount">0 combos</div>
    </div>

    <div class="note-box" id="strategyNote">
        Đang tải chiến thuật...
    </div>

    <div class="table-area">
        <div class="poker-table"></div>
        <button class="pos-btn" id="btn-BTN" onclick="selectPosition('BTN')">BTN</button>
        <button class="pos-btn" id="btn-SB" onclick="selectPosition('SB')">SB</button>
        <button class="pos-btn" id="btn-BB" onclick="selectPosition('BB')">BB</button>
        <button class="pos-btn" id="btn-UTG" onclick="selectPosition('UTG')">UTG</button>
        <button class="pos-btn" id="btn-MP" onclick="selectPosition('MP')">MP</button>
        <button class="pos-btn" id="btn-HJ" onclick="selectPosition('HJ')">HJ</button>
        <button class="pos-btn" id="btn-CO" onclick="selectPosition('CO')">CO</button>
    </div>

    <script>
        const ranks = ['A', 'K', 'Q', 'J', 'T', '9', '8', '7', '6', '5', '4', '3', '2'];
        const grid = document.getElementById('handGrid');
        const percentageText = document.getElementById('percentage');
        const handCountText = document.getElementById('handCount');
        const noteBox = document.getElementById('strategyNote');

        // Khởi tạo bảng Grid
        for (let i = 0; i < ranks.length; i++) {
            for (let j = 0; j < ranks.length; j++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                let handId = '';
                if (i === j) handId = ranks[i] + ranks[j]; 
                else if (i < j) handId = ranks[i] + ranks[j] + 's';
                else handId = ranks[j] + ranks[i] + 'o'; 
                
                cell.id = handId;
                cell.innerText = handId;
                grid.appendChild(cell);
            }
        }

        // Database Chiến thuật (Raise màu đỏ, Call màu xanh)
        const positionData = {
            'UTG': {
                raise: "77+, ATs+, KJs+, QJs, JTs, AJo+, KQo",
                call: "",
                note: "<b>🚨 TUYỆT ĐỐI KHÔNG LIMP:</b> Ở vị trí này 1 là <b>Raise</b>, 2 là <b>Fold</b>. Đừng biến mình thành cá. Nếu gặp 3-Bet: 4-Bet với AA, KK, AKs và Call với JJ, TT, AQs."
            },
            'MP': {
                raise: "55+, A9s+, KTs+, QTs+, JTs, T9s, ATo+, KQo",
                call: "",
                note: "<b>🚨 CHỈ RAISE HOẶC FOLD:</b> Tuyệt đối không Limp. Cẩn thận bẫy Kicker: các hand Offsuit có Kicker từ 10 trở xuống là máy bào tiền."
            },
            'HJ': {
                raise: "22+, A2s+, KTs+, QTs+, JTs, T9s, 98s, 87s, 76s, ATo+, KQo, KJo, QJo",
                call: "",
                note: "<b>⚔️ KẺ ĐI SĂN:</b> 1 là <b>Raise</b>, 2 là <b>Fold</b>. Nếu có người Limp trước mặt, hãy Raise Isolate thật lớn (~100-120 chip) để cô lập họ."
            },
            'CO': {
                raise: "22+, A2s+, K5s+, Q8s+, J8s+, T8s+, 98s, 87s, 76s, 65s, A9o+, KTo+, QTo+, JTo",
                call: "",
                note: "<b>🎯 SÁT THỦ:</b> Mục tiêu là đuổi Button để giành quyền hành động cuối cùng. <b>Chỉ Raise hoặc Fold</b>, không bao giờ Limp!"
            },
            'BTN': {
                raise: "22+, A2s+, K2s+, Q2s+, J5s+, T6s+, 95s+, 85s+, 75s+, 65s, 54s, A2o+, K9o+, Q9o+, J9o+, T9o",
                call: "",
                note: "<b>👑 ÔNG CHỦ:</b> Cướp tiền mù tối đa! <b>Chỉ Raise hoặc Fold</b>. Dù có quyền lực nhưng nhớ phải quăng 50% bài rác (như 72o, K8o-, Q8o-)."
            },
            'SB': {
                raise: "22+, A2s+, K5s+, Q7s+, J7s+, T7s+, 97s+, 87s+, 76s+, 65s, 54s, A7o+, KTo+, QTo+, JTo",
                call: "",
                note: "<b>🛡️ KỶ LUẬT SẮT:</b> Nếu Open thì Raise 3x BB. <b>Nếu có người Raise trước: 3-BET HOẶC FOLD</b> (Tuyệt đối không Call ngang/Limp). Đừng tiếc 0.5 BB lẻ."
            },
            'BB': {
                raise: "JJ+, AQs+, AQo+",
                call: "22-TT, A2s-AJs, K2s-KQs, Q2s-QJs, J2s-JTs, T2s-T9s, 98s, 87s, 76s, 65s, 54s, A2o-AJo, KTo-KQo, QTo-QJo, JTo",
                note: "<b>🏰 BẢO VỆ LÃNH THỔ:</b> <br>- <b>Nếu cả bàn Limp:</b> LIMP (Check) theo để xem Flop miễn phí.<br>- <b>Nếu bị Raise:</b> Call rộng để Defend, và 3-Bet với hàng khủng (JJ+, AQ+)."
            }
        };

        // Hàm phân tích chuỗi Range thông minh (Xử lý được dấu + và dấu -)
        function parseRange(rangeStr) {
            let hands = new Set();
            if(!rangeStr) return Array.from(hands);
            let tokens = rangeStr.split(',').map(s => s.trim());
            
            for (let token of tokens) {
                if (token.includes('+')) {
                    let base = token.replace('+', '');
                    let suffix = base.length === 3 ? base[2] : '';
                    if (base[0] === base[1]) {
                        let idxEnd = ranks.indexOf(base[0]); 
                        for (let i = 0; i <= idxEnd; i++) hands.add(ranks[i] + ranks[i]);
                    } else {
                        let r1 = base[0];
                        let idxEnd = ranks.indexOf(base[1]);
                        let idxStart = ranks.indexOf(r1) + 1;
                        for (let i = idxStart; i <= idxEnd; i++) hands.add(r1 + ranks[i] + suffix);
                    }
                } else if (token.includes('-')) {
                    let parts = token.split('-');
                    let start = parts[0], end = parts[1];
                    let suffix = start.length === 3 ? start[2] : '';
                    if (start[0] === start[1]) {
                        let idxStart = ranks.indexOf(end[0]), idxEnd = ranks.indexOf(start[0]);
                        for(let i = idxStart; i <= idxEnd; i++) hands.add(ranks[i] + ranks[i]);
                    } else {
                        let r1 = start[0];
                        let idxStart = ranks.indexOf(end[1]), idxEnd = ranks.indexOf(start[1]);
                        for(let i = idxStart; i <= idxEnd; i++) hands.add(r1 + ranks[i] + suffix);
                    }
                } else {
                    hands.add(token);
                }
            }
            return Array.from(hands);
        }

        // Cập nhật giao diện
        function selectPosition(pos) {
            document.querySelectorAll('.pos-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + pos).classList.add('active');
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('raise', 'call');
            });

            let data = positionData[pos];
            let raiseHands = parseRange(data.raise);
            let callHands = parseRange(data.call);
            let totalCombos = 0;

            // Đổ màu Đỏ (Raise)
            raiseHands.forEach(hand => {
                let el = document.getElementById(hand);
                if (el) {
                    el.classList.add('raise');
                    totalCombos += countCombos(hand);
                }
            });

            // Đổ màu Xanh (Call)
            callHands.forEach(hand => {
                let el = document.getElementById(hand);
                if (el) {
                    el.classList.add('call');
                    totalCombos += countCombos(hand);
                }
            });

            // Hiển thị ghi chú
            noteBox.innerHTML = data.note;

            // Tính %
            let percentage = ((totalCombos / 1326) * 100).toFixed(1);
            percentageText.innerText = `Chơi: ${percentage}% Hand`;
            handCountText.innerText = `Tổng: ${totalCombos} combos`;
        }

        function countCombos(hand) {
            if (hand.length === 2) return 6; // Đôi
            if (hand.includes('s')) return 4; // Đồng chất
            if (hand.includes('o')) return 12; // Khác chất
            return 0;
        }

        // Chọn Button làm mặc định
        selectPosition('BTN');
    </script>
</body>
</html>
